name: Guardian Multi-Environment Pipeline

on:
  push:
    branches: [ "main", "dev", "staging" ]
  pull_request:
    branches: [ "main", "dev", "staging" ]

jobs:

  # ---------------------------------------------------------
  # 1. DEVELOPMENT ENVIRONMENT
  # ---------------------------------------------------------
  dev-environment:
    name: Development Environment
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm install

      - name: Run linting
        run: npm run lint

      - name: Run unit tests
        run: npm test

      - name: Build TypeScript
        run: npm run build

      - name: Development Stage Complete
        run: echo "Guardian Development Stage passed."

  # ---------------------------------------------------------
  # 2. STAGING ENVIRONMENT
  # ---------------------------------------------------------
  staging-environment:
    name: Staging Environment
    runs-on: ubuntu-latest
    needs: dev-environment

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm install

      - name: Run integration tests
        run: npm run test:integration

      - name: Validate policies
        run: node ./scripts/validate-policies.js

      - name: Staging Stage Complete
        run: echo "Guardian Staging Stage passed."

  # ---------------------------------------------------------
  # 3. PRODUCTION ENVIRONMENT
  # ---------------------------------------------------------
  production-environment:
    name: Production Environment
    runs-on: ubuntu-latest
    needs: staging-environment
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm install

      - name: Run full test suite
        run: npm run test:full

      - name: Build production bundle
        run: npm run build

      - name: Production Stage Complete
        run: echo "Guardian Production Stage passed. System ready for deployment."
