name: Guardian Release Pipeline

on:
  workflow_dispatch:
  push:
    tags:
      - "v*.*.*"

jobs:
  release:
    name: Guardian Release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm install

      - name: Build production bundle
        run: npm run build

      - name: Generate changelog
        id: changelog
        run: |
          echo "Generating changelog..."
          npx conventional-changelog -p angular -i CHANGELOG.md -s
          echo "changelog_generated=true" >> $GITHUB_OUTPUT

      - name: Commit changelog
        if: steps.changelog.outputs.changelog_generated == 'true'
        run: |
          git config user.name "guardian-release-bot"
          git config user.email "guardian@spaceleaf.org"
          git add CHANGELOG.md
          git commit -m "docs: update changelog for release"
          git push

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: "Guardian Release ${{ github.ref_name }}"
          body: |
            ## Guardian-Companion Release ${{ github.ref_name }}
            Seal of Modular Integrity reaffirmed.
            Emotional Safety Standard enforced.
            Dependency Lockdown Policy validated.
          draft: false
          prerelease: false

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: guardian-build
          path: dist/

      - name: Release Complete
        run: echo "🛡️ Guardian Release Pipeline completed successfully."
